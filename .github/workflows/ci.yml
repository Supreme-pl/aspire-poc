name: CI

on:
  workflow_dispatch:

jobs:
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.201'

      - name: Restore
        run: dotnet restore AspirePoc.slnx

      - name: Build
        run: dotnet build AspirePoc.slnx --no-restore --configuration Release

      - name: Run integration tests
        run: |
          dotnet test integration-tests/src/AspirePoc.IntegrationTests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=integration-tests.trx" \
            --logger "console;verbosity=normal" \
            --results-directory ${{ runner.temp }}/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ runner.temp }}/test-results
          retention-days: 7

      - name: Upload CSV outputs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: csv-outputs
          path: /tmp/aspire-poc-test-*/**
          retention-days: 7
          if-no-files-found: ignore
